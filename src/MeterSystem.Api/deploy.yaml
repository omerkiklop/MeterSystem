apiVersion: apps/v1
kind: Deployment
metadata:
  name: metersystem-api
spec:
  replicas: 1
  selector:
    matchLabels:
      app: metersystem-api
  template:
    metadata:
      labels:
        app: metersystem-api
    spec:
      containers:
        - name: metersystem-api
          image: metersystem-api:latest
          imagePullPolicy: Never
          ports:
            - containerPort: 8080
          env:
            - name: ASPNETCORE_HTTP_PORTS
              value: "8080"
            - name: RabbitMq__Host
              value: rabbitmq
            - name: RabbitMq__Port
              value: "5672"
            - name: RabbitMq__Username
              value: guest
            - name: RabbitMq__Password
              value: guest
            - name: RabbitMq__QueueName
              value: meter.readings
          livenessProbe:
            httpGet:
              path: /health/live
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 15
          readinessProbe:
            httpGet:
              path: /health/ready
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: metersystem-api
spec:
  selector:
    app: metersystem-api
  type: NodePort
  ports:
    - port: 80
      targetPort: 8080
      nodePort: 30080
